<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood collage — preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1816;
      color: #e8e4dc;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 320px) 1fr;
      min-height: 100vh;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
    .panel {
      padding: 1rem 1.1rem 2rem;
      background: #252220;
      border-right: 1px solid rgba(255,255,255,0.06);
      overflow-y: auto;
    }
    .panel h1 { font-size: 1rem; font-weight: 600; margin: 0 0 0.35rem; }
    .panel .note {
      font-size: 0.78rem;
      color: #9a9590;
      line-height: 1.45;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8a8580;
      margin: 0.7rem 0 0.25rem;
    }
    textarea, input[type="date"] {
      width: 100%;
      font: inherit;
      font-size: 0.88rem;
      padding: 0.45rem 0.5rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      background: #1a1816;
      color: #e8e4dc;
      min-height: 3.25rem;
      resize: vertical;
    }
    input[type="date"] { min-height: auto; }
    .btn {
      display: inline-block;
      margin-top: 0.85rem;
      padding: 0.45rem 0.75rem;
      font: inherit;
      font-size: 0.82rem;
      border: 1px solid #e6d4a8;
      border-radius: 4px;
      background: #e6d4a8;
      color: #1a1610;
      font-weight: 600;
      cursor: pointer;
    }
    .status {
      font-size: 0.78rem;
      color: #9a9590;
      margin-top: 0.75rem;
      min-height: 1.2em;
      line-height: 1.45;
    }
    .status.err { color: #e8a598; }
    .preview-wrap {
      padding: 0 0 3rem;
      background: #121110;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .preview-stage {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .day-stepper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      width: 100%;
      max-width: 100vw;
      padding: 1rem 1rem 0;
    }
    .day-stepper .btn-step {
      margin-top: 0;
      min-width: 7.5rem;
      background: #252220;
      color: #e8e4dc;
      border-color: rgba(255, 255, 255, 0.14);
    }
    .day-stepper .btn-step:hover {
      background: #2f2b28;
      border-color: rgba(230, 212, 168, 0.45);
    }
    .day-stepper .day-label {
      font-size: 0.82rem;
      color: #9a9590;
      min-width: 9.5rem;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    #screen-quilt {
      --quilt-float-card-max: 460px;
      --quilt-clipping-font: 'DM Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
      --quilt-clipping-ink: rgba(42, 34, 28, 0.86);
      --quilt-paper-card-texture: url("assets/quilt-paper-card-texture.png");
      --quilt-paper-surface-image:
        linear-gradient(118deg, rgba(72, 58, 42, 0.03) 0%, transparent 52%),
        linear-gradient(298deg, rgba(58, 44, 30, 0.04) 0%, transparent 54%);
      --odq-artifact-shadow:
        drop-shadow(0 4px 14px rgba(45, 36, 29, 0.14))
        drop-shadow(0 1px 3px rgba(45, 36, 29, 0.1));
      width: 100vw;
      max-width: none;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1>Mood collage</h1>
      <p class="note">Quote clipping loads from Firestore <code>instagram-images/&#123;date&#125;</code> (same PNG as the app). Quilt from <code>quilts/&#123;date&#125;</code>. Open <code>http://127.0.0.1:3000/mood-triptych-lab</code> after <code>npm start</code>.</p>

      <label for="dateKey">Quilt date</label>
      <input type="date" id="dateKey">

      <label for="quoteText">Quote</label>
      <textarea id="quoteText">I define connection as the energy that exists between people when they feel seen, heard, and valued; when they can give and receive without judgment.</textarea>

      <label for="quoteAuthor">Author</label>
      <textarea id="quoteAuthor" rows="1">Brené Brown</textarea>

      <label for="goodDay">Good day (under top tape)</label>
      <textarea id="goodDay">Hard mute the inner critic.</textarea>

      <label for="roughDay">Rough day (under bottom tape)</label>
      <textarea id="roughDay">Let the difficult thing stay difficult for one more breath.</textarea>

      <button type="button" class="btn" id="renderBtn">Render</button>
      <p class="status" id="status">Loading…</p>
    </aside>

    <main class="preview-wrap">
      <div class="preview-stage">
        <section id="screen-quilt">
          <div id="quiltMoodCollage" class="quilt-mood-collage" hidden></div>
        </section>
      </div>
      <div class="day-stepper" aria-label="Browse quilt days">
        <button type="button" class="btn btn-step" id="prevDayBtn" title="Previous day (←)">← Prev day</button>
        <span class="day-label" id="previewDayLabel" aria-live="polite"></span>
        <button type="button" class="btn btn-step" id="nextDayBtn" title="Next day (→)">Next day →</button>
      </div>
    </main>
  </div>

  <script src="/lib/app-config.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, doc, getDocFromServer } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    window.__moodCollageLabFirestore = null;
    try {
      const app = initializeApp(CONFIG.FIREBASE);
      window.__moodCollageLabFirestore = { db: getFirestore(app), doc, getDocFromServer };
    } catch (err) {
      console.warn('Firebase init failed:', err);
    }
  </script>
  <script src="/lib/quote-keyword-emphasis.js"></script>
  <script src="/lib/layout-b-keyword-emphasis.js"></script>
  <script src="/lib/quilt-newspaper-clipping.js?v=29"></script>
  <script src="/lib/quilt-mood-collage-widget.js?v=45"></script>
  <script>
    (function () {
      const QNC = window.QuiltNewspaperClipping;
      const CollageW = window.QuiltMoodCollageWidget;
      const host = document.getElementById('quiltMoodCollage');
      const statusEl = document.getElementById('status');
      const dateInput = document.getElementById('dateKey');
      const previewDayLabel = document.getElementById('previewDayLabel');

      function getAppTodayKey() {
        const source = new Date();
        const adjusted = new Date(source);
        if (source.getUTCHours() < 7) adjusted.setUTCDate(adjusted.getUTCDate() - 1);
        return adjusted.toISOString().slice(0, 10);
      }

      dateInput.value = getAppTodayKey();

      function shiftDateKey(days) {
        const base = dateInput.value || getAppTodayKey();
        const d = new Date(`${base}T12:00:00`);
        if (Number.isNaN(d.getTime())) return;
        d.setDate(d.getDate() + days);
        dateInput.value = d.toISOString().slice(0, 10);
        updatePreviewDayLabel();
        render();
      }

      function updatePreviewDayLabel() {
        if (!previewDayLabel) return;
        previewDayLabel.textContent = dateInput.value || getAppTodayKey();
      }

      function setStatus(msg, isErr) {
        statusEl.textContent = msg || '';
        statusEl.className = 'status' + (isErr ? ' err' : '');
      }

      async function waitForFirebase(maxMs = 5000) {
        const start = Date.now();
        while (!window.__moodCollageLabFirestore?.db && Date.now() - start < maxMs) {
          await new Promise((r) => setTimeout(r, 50));
        }
      }

      async function fetchFirestoreDoc(collection, id) {
        await waitForFirebase();
        const fs = window.__moodCollageLabFirestore;
        if (!fs?.db) throw new Error('Firebase not ready — use npm start on localhost');
        const ref = fs.doc(fs.db, collection, id);
        const snap = await fs.getDocFromServer(ref);
        return snap.exists() ? snap.data() || {} : null;
      }

      function readNewspaperClippingUrl(data) {
        if (!data || typeof data !== 'object') return '';
        return String(data.newspaperClippingUrl || data.newspaperClippingImageStorageUrl || '').trim();
      }

      function cacheBustClippingUrl(url, rev = '') {
        const u = String(url || '').trim();
        if (!u || u.startsWith('data:') || u.startsWith('blob:')) return u;
        const bust = String(rev || Date.now()).trim();
        try {
          const parsed = new URL(u, location.href);
          parsed.searchParams.set('odq_v', bust);
          return parsed.href;
        } catch (_) {
          const sep = u.includes('?') ? '&' : '?';
          return `${u}${sep}odq_v=${encodeURIComponent(bust)}`;
        }
      }

      async function fetchQuiltBlocks(dateKey) {
        const data = await fetchFirestoreDoc('quilts', dateKey);
        if (!data) throw new Error(`No quilt for ${dateKey}`);
        const blocks = CollageW.normalizeBlocks(data.blocks);
        if (!blocks.length) throw new Error(`Quilt ${dateKey} has no blocks`);
        return {
          blocks,
          blockCount: Array.isArray(data.blocks) ? data.blocks.length : blocks.length
        };
      }

      async function fetchFirestoreQuoteBundle(dateKey) {
        const [igData, assignData] = await Promise.all([
          fetchFirestoreDoc('instagram-images', dateKey),
          fetchFirestoreDoc('dailyQuoteAssignments', dateKey)
        ]);

        let clippingUrl = readNewspaperClippingUrl(igData);
        let clippingSource = clippingUrl ? 'instagram-images' : '';

        const assign = assignData || {};
        let text = String(assign.textSnapshot || assign.text || '').trim();
        let author = String(assign.authorSnapshot || assign.author || '').trim();
        let goodDay = String(assign.goodDaySnapshot || assign.goodDay || assign.good_day || '').trim();
        let roughDay = String(assign.roughDaySnapshot || assign.roughDay || assign.rough_day || '').trim();

        const sourceId = String(assign.sourceId || '').trim();
        if (sourceId) {
          const quoteDoc = await fetchFirestoreDoc('quotes', sourceId);
          if (quoteDoc) {
            if (!text) text = String(quoteDoc.text || quoteDoc.body || '').trim();
            if (!author) author = String(quoteDoc.author || '').trim();
            if (!goodDay) goodDay = String(quoteDoc.goodDay || quoteDoc.good_day || '').trim();
            if (!roughDay) roughDay = String(quoteDoc.roughDay || quoteDoc.rough_day || '').trim();
          }
        }

        if (!clippingUrl) {
          const datedQuote = await fetchFirestoreDoc('quotes', dateKey);
          clippingUrl = readNewspaperClippingUrl(datedQuote);
          if (clippingUrl) clippingSource = 'quotes';
        }

        const clippingRev = String(
          igData?.newspaperClippingGeneratedAt ||
            igData?.lastIgPushCompletedAt ||
            igData?.lastUpdated ||
            ''
        ).trim();

        return {
          clippingUrl: clippingUrl ? cacheBustClippingUrl(clippingUrl, clippingRev || dateKey) : '',
          clippingSource,
          text,
          author,
          goodDay,
          roughDay
        };
      }

      function applyQuoteFields(bundle) {
        if (bundle.text) document.getElementById('quoteText').value = bundle.text;
        if (bundle.author) document.getElementById('quoteAuthor').value = bundle.author;
        if (bundle.goodDay) document.getElementById('goodDay').value = bundle.goodDay;
        if (bundle.roughDay) document.getElementById('roughDay').value = bundle.roughDay;
      }

      function payload(bundle = {}) {
        return {
          dateKey: dateInput.value || getAppTodayKey(),
          paperTextureUrl: null,
          today: {
            text: bundle.text || document.getElementById('quoteText').value.trim(),
            author: bundle.author || document.getElementById('quoteAuthor').value.trim(),
            keyword: '',
            first_line_count: 4
          },
          goodDay: bundle.goodDay || document.getElementById('goodDay').value.trim(),
          roughDay: bundle.roughDay || document.getElementById('roughDay').value.trim(),
          clippingUrl: bundle.clippingUrl || ''
        };
      }

      async function resolveQuoteClippingUrl(data) {
        if (data.clippingUrl) return { url: data.clippingUrl, source: 'firestore' };
        if (!QNC?.composeDataUrl) throw new Error('No Firestore clipping and local compose unavailable');
        const local = await QNC.composeDataUrl({
          today: data.today,
          dateKey: data.dateKey,
          paperTextureUrl: data.paperTextureUrl,
          width: 0
        });
        if (!local) throw new Error('Quote compose failed');
        return { url: local, source: 'local-compose' };
      }

      let renderGen = 0;

      async function render() {
        if (!CollageW?.mount) {
          setStatus('Missing collage widget — open http://127.0.0.1:3000/mood-triptych-lab', true);
          return;
        }
        const gen = ++renderGen;
        const dateKey = dateInput.value || getAppTodayKey();
        setStatus(`Loading Firestore data for ${dateKey}…`);
        try {
          CollageW.unmount(host);
          const [quilt, bundle] = await Promise.all([
            fetchQuiltBlocks(dateKey),
            fetchFirestoreQuoteBundle(dateKey)
          ]);
          if (gen !== renderGen) return;
          applyQuoteFields(bundle);
          const data = payload(bundle);
          if (!data.goodDay || !data.roughDay) {
            throw new Error(`Missing good/rough day copy for ${dateKey}`);
          }
          setStatus(
            bundle.clippingUrl
              ? `Quilt: ${quilt.blockCount} blocks. Loading clipping from ${bundle.clippingSource || 'Firestore'}…`
              : `Quilt: ${quilt.blockCount} blocks. No Firestore clipping — composing locally…`
          );
          const { url: quoteDataUrl, source } = await resolveQuoteClippingUrl(data);
          if (gen !== renderGen) return;
          const mounted = CollageW.mount(host, {
            quoteDataUrl,
            goodDay: data.goodDay,
            roughDay: data.roughDay,
            quiltBlocks: quilt.blocks,
            dateKey,
            overlayQuilt: false,
            onReady: () => {
              if (gen !== renderGen) return;
              const clipNote =
                source === 'firestore'
                  ? `Firestore clipping (${bundle.clippingSource || 'instagram-images'})`
                  : 'local compose fallback';
              setStatus(`Ready — ${clipNote}. ${quilt.blockCount} quilt blocks. Scratch a tape strip.`);
            },
            onSelect: (mood) => {
              setStatus(`Picked ${mood}.`);
            }
          });
          if (!mounted) throw new Error('Collage mount failed');
        } catch (err) {
          if (gen !== renderGen) return;
          setStatus(String(err?.message || err), true);
          CollageW.unmount(host);
        }
      }

      document.getElementById('renderBtn').addEventListener('click', render);
      document.getElementById('prevDayBtn').addEventListener('click', () => shiftDateKey(-1));
      document.getElementById('nextDayBtn').addEventListener('click', () => shiftDateKey(1));
      dateInput.addEventListener('change', () => {
        updatePreviewDayLabel();
        render();
      });
      document.addEventListener('keydown', (e) => {
        if (e.target.closest('textarea, input:not([type="date"])')) return;
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          shiftDateKey(-1);
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          shiftDateKey(1);
        }
      });
      updatePreviewDayLabel();
      render();
    })();
  </script>
</body>
</html>
