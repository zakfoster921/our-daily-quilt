<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1, viewport-fit=cover">
  <title>Intro persona frame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,300;1,400;1,500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/our-daily-beta.css">
  <style>
    html, body {
      margin: 0;
      width: 390px;
      height: 844px;
      overflow: hidden;
      background: #fff;
    }
    .intro-frame-screen {
      display: none !important;
      opacity: 1 !important;
      pointer-events: none !important;
      position: fixed !important;
      inset: 0 !important;
      width: 390px !important;
      height: 844px !important;
      min-height: 844px !important;
      max-height: 844px !important;
      overflow: hidden !important;
      box-sizing: border-box !important;
      z-index: 1 !important;
    }
    .intro-frame-screen.is-frame-active {
      display: flex !important;
      visibility: visible !important;
      opacity: 1 !important;
      pointer-events: auto !important;
    }
    .intro-frame-screen:not(.is-frame-active) {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
    .intro-frame-screen:not(.is-frame-active) * {
      visibility: hidden !important;
    }
    .intro-frame-screen.is-frame-active .welcome-screen-fade-in,
    .intro-frame-screen.is-frame-active .welcome-screen-fade-in.visible {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
    }
    .intro-frame-screen.is-frame-active .intro-persona-copy {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
    }
  </style>
</head>
<body>
  <section class="screen intro-persona-screen intro-frame-screen" id="screen-intro-zak" data-frame="zak" aria-label="Meet Zak">
    <div class="intro-persona-inner">
      <div class="intro-persona-copy intro-zak-copy">
        <p class="intro-zak-line intro-zak-line--1">Hey <span class="intro-zak-name">Friend</span>,</p>
        <p class="intro-zak-line intro-zak-line--2">I&rsquo;m Zak</p>
        <p class="intro-zak-line intro-zak-line--3">I&rsquo;m a quilter</p>
        <p class="intro-zak-line intro-zak-line--4">poet</p>
        <p class="intro-zak-line intro-zak-line--5">+</p>
        <p class="intro-zak-line intro-zak-line--6">social gatherer</p>
      </div>
      <img
        class="intro-persona-figure intro-persona-figure--zak"
        src="assets/intro-zak-peace.webp"
        alt=""
        width="480"
        height="602"
        decoding="async"
      />
    </div>
  </section>

  <section class="screen intro-persona-screen intro-frame-screen" id="screen-intro-mission" data-frame="mission" aria-label="Why Our Daily Quilt exists">
    <div class="intro-persona-inner">
      <div class="intro-persona-copy intro-mission-copy">
        <p class="intro-mission-line">I made this app because I wanted a place where folks could make something <span class="intro-persona-display">beautiful</span></p>
        <p class="intro-mission-together">together</p>
      </div>
      <img
        class="intro-persona-figure intro-persona-figure--mission"
        src="assets/intro-mission-heart.webp"
        alt=""
        width="411"
        height="458"
        decoding="async"
      />
    </div>
  </section>

  <section class="screen intro-frame-screen" id="screen-welcome" data-frame="welcome" aria-label="How it works">
    <div class="welcome-content">
      <div class="welcome-main">
        <div class="welcome-how-heading-wrap welcome-screen-fade-in visible">
          <h1 class="welcome-how-heading">Here&rsquo;s how it works</h1>
        </div>
        <div class="welcome-steps" aria-label="How it works">
          <section class="welcome-step welcome-screen-fade-in visible">
            <h2 class="welcome-step__title">Read today&rsquo;s quote</h2>
          </section>
          <section class="welcome-step welcome-screen-fade-in visible">
            <h2 class="welcome-step__title">Choose your color</h2>
          </section>
          <section class="welcome-step welcome-screen-fade-in visible">
            <h2 class="welcome-step__title">Watch the quilt grow</h2>
          </section>
        </div>
        <footer class="welcome-footer welcome-screen-fade-in visible">
          <button type="button" class="btn welcome-begin-btn" tabindex="-1">BEGIN</button>
        </footer>
      </div>
      <img
        class="welcome-zak-figure welcome-screen-fade-in visible"
        src="assets/intro-welcome-lean.webp"
        alt=""
        width="301"
        height="412"
        decoding="async"
      />
    </div>
  </section>

  <script>
    (function () {
      var key = (new URLSearchParams(location.search).get('screen') || 'zak').toLowerCase();
      document.querySelectorAll('.intro-frame-screen').forEach(function (el) {
        el.classList.remove('is-frame-active', 'active', 'intro-persona-visible');
      });
      var screen = document.querySelector('[data-frame="' + key + '"]');
      if (screen) {
        screen.classList.add('is-frame-active', 'active');
        if (key === 'zak' || key === 'mission') {
          screen.classList.add('intro-persona-visible');
        }
      }
    })();
  </script>
</body>
</html>
