name: Notion Firestore Sync

on:
  schedule:
    # Once daily at 07:15 UTC
    - cron: "15 7 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Schedule mode: 'append' (default — tack at end of queue, matches the daily cron) or 'swap' (newly-approved quotes take tomorrow's slot)."
        required: false
        default: "append"
        type: choice
        options:
          - append
          - swap

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      # Transient ECONNRESET / registry blips are common on scheduled runs; npm
      # retries + a few full retries avoid a false-negative failed sync.
      - name: Install dependencies (skip native builds)
        run: |
          npm config set fetch-retries 8
          npm config set fetch-retry-mintimeout 15000
          npm config set fetch-retry-maxtimeout 120000
          for attempt in 1 2 3 4; do
            if npm ci --ignore-scripts; then
              exit 0
            fi
            if [ "$attempt" -eq 4 ]; then
              echo "npm ci failed after 4 attempts"
              exit 1
            fi
            echo "npm ci failed (attempt ${attempt}/4), waiting 60s before retry..."
            sleep 60
          done

      - name: Validate required secrets
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${NOTION_TOKEN:-}" ] || [ -z "${NOTION_DATABASE_ID:-}" ] || [ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ]; then
            echo "Missing required secrets: NOTION_TOKEN, NOTION_DATABASE_ID, GOOGLE_APPLICATION_CREDENTIALS_JSON"
            exit 1
          fi

      - name: Sync quotes (Notion -> Firestore)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
        run: npm run sync:quotes

      - name: Reconcile assignments from Notion date_scheduled
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          FIRESTORE_ASSIGNMENTS_COLLECTION: ${{ secrets.FIRESTORE_ASSIGNMENTS_COLLECTION }}
        run: npm run reconcile:assignment-dates

      # Cron and default manual dispatch use --append-only (new approvals tack
      # onto the end of the queue). Pick workflow_dispatch input "swap" when a
      # newly approved quote should take tomorrow's slot and displace what was there.
      - name: Schedule approved app-submitted quotes
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          FIRESTORE_ASSIGNMENTS_COLLECTION: ${{ secrets.FIRESTORE_ASSIGNMENTS_COLLECTION }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$MODE" != "swap" ]; then
            echo "[workflow] running schedule script in --append-only mode"
            node scripts/schedule-approved-app-submissions.cjs --start=today --cadence=1 --window=8 --append-only
          else
            echo "[workflow] running schedule script in swap mode"
            node scripts/schedule-approved-app-submissions.cjs --start=today --cadence=1 --window=8
          fi

      - name: Append rolling 7-day quote window
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          FIRESTORE_ASSIGNMENTS_COLLECTION: ${{ secrets.FIRESTORE_ASSIGNMENTS_COLLECTION }}
        run: node scripts/backfill-daily-assignments.cjs --start=today --cadence=1 --window=8 --min-count=9 --append-only

      - name: Process speaker cutouts for scheduled quotes
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          FIRESTORE_ASSIGNMENTS_COLLECTION: ${{ secrets.FIRESTORE_ASSIGNMENTS_COLLECTION }}
          REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}
        run: node scripts/process-speaker-cutouts.cjs --scheduled --require-reviewed --start=today --window=9 --limit=3 --soft-fail

      - name: Sync usage (Firestore -> Notion)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          FIRESTORE_DAILY_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_DAILY_QUOTES_COLLECTION }}
        run: npm run sync:usage
