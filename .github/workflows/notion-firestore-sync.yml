name: Notion Firestore Sync

on:
  schedule:
    # 06:30 UTC — 30 min before daily quilt reset (07:00). Uses --start=opening so
    # scheduling + cutouts target the opening app-day (stable if Actions runs late).
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Schedule mode for manual runs only. Cron always uses swap. 'append' tacks new approvals at end of queue; 'swap' places them on the day after --start (displaces that slot)."
        required: false
        default: "append"
        type: choice
        options:
          - append
          - swap

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      # Transient ECONNRESET / registry blips are common on scheduled runs; npm
      # retries + a few full retries avoid a false-negative failed sync.
      - name: Install dependencies (skip native builds)
        timeout-minutes: 8
        run: |
          npm config set fetch-retries 8
          npm config set fetch-retry-mintimeout 15000
          npm config set fetch-retry-maxtimeout 120000
          for attempt in 1 2 3 4; do
            if npm ci --ignore-scripts; then
              exit 0
            fi
            if [ "$attempt" -eq 4 ]; then
              echo "npm ci failed after 4 attempts"
              exit 1
            fi
            echo "npm ci failed (attempt ${attempt}/4), waiting 60s before retry..."
            sleep 60
          done

      - name: Validate required secrets
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${NOTION_TOKEN:-}" ] || [ -z "${NOTION_DATABASE_ID:-}" ] || [ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ]; then
            echo "Missing required secrets: NOTION_TOKEN, NOTION_DATABASE_ID, GOOGLE_APPLICATION_CREDENTIALS_JSON"
            exit 1
          fi

      - name: Set schedule window for assignment scripts
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "START_ARG=--start=opening" >> "$GITHUB_ENV"
            echo "[workflow] scheduled cron: START_ARG=--start=opening (live quilt day at 07:00 UTC reset)"
          else
            echo "START_ARG=--start=today" >> "$GITHUB_ENV"
            echo "[workflow] manual dispatch: START_ARG=--start=today (live app-day)"
          fi

      - name: Sync quotes (Notion -> Firestore)
        timeout-minutes: 8
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
        run: node scripts/sync-notion-to-firestore.cjs "${START_ARG}" --window=7

      - name: Reconcile assignments from Notion date_scheduled
        timeout-minutes: 5
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          FIRESTORE_ASSIGNMENTS_COLLECTION: ${{ secrets.FIRESTORE_ASSIGNMENTS_COLLECTION }}
        run: node scripts/reconcile-assignment-dates-from-notion.cjs "${START_ARG}"

      # Nightly cron: swap — newly approved (recent Notion edit, no pinned date) takes
      # the day after --start=opening and bumps the previous occupant back to the pool.
      # Manual dispatch: append unless you pick "swap" in the workflow input.
      - name: Schedule approved app-submitted quotes
        timeout-minutes: 5
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          FIRESTORE_ASSIGNMENTS_COLLECTION: ${{ secrets.FIRESTORE_ASSIGNMENTS_COLLECTION }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$MODE" = "swap" ]; then
            echo "[workflow] running schedule script in swap mode (new approvals → day after start)"
            node scripts/schedule-approved-app-submissions.cjs "${START_ARG}" --cadence=1 --window=8
          else
            echo "[workflow] running schedule script in --append-only mode"
            node scripts/schedule-approved-app-submissions.cjs "${START_ARG}" --cadence=1 --window=8 --append-only
          fi

      - name: Fill near-term schedule gaps
        timeout-minutes: 5
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          FIRESTORE_ASSIGNMENTS_COLLECTION: ${{ secrets.FIRESTORE_ASSIGNMENTS_COLLECTION }}
        run: node scripts/backfill-daily-assignments.cjs "${START_ARG}" --cadence=1 --window=8 --fill-gaps-only

      - name: Append rolling 7-day quote window
        timeout-minutes: 5
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          FIRESTORE_ASSIGNMENTS_COLLECTION: ${{ secrets.FIRESTORE_ASSIGNMENTS_COLLECTION }}
        run: node scripts/backfill-daily-assignments.cjs "${START_ARG}" --cadence=1 --window=8 --min-count=9 --append-only

      - name: Process speaker cutouts for scheduled quotes
        timeout-minutes: 10
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          FIRESTORE_ASSIGNMENTS_COLLECTION: ${{ secrets.FIRESTORE_ASSIGNMENTS_COLLECTION }}
          REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}
        run: node scripts/process-speaker-cutouts.cjs --scheduled --require-reviewed "${START_ARG}" --window=9 --limit=3 --soft-fail

      - name: Process tomorrow's speaker cutout (admin preview lookahead)
        timeout-minutes: 5
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          FIRESTORE_ASSIGNMENTS_COLLECTION: ${{ secrets.FIRESTORE_ASSIGNMENTS_COLLECTION }}
          REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}
        run: node scripts/process-speaker-cutouts.cjs --opening-plus-one-speaker --require-reviewed --soft-fail

      - name: Sync usage (Firestore -> Notion)
        timeout-minutes: 8
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          FIRESTORE_DAILY_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_DAILY_QUOTES_COLLECTION }}
        run: node scripts/sync-usage-firestore-to-notion.cjs "${START_ARG}" --window=7
