name: Reflection Themes Archive

on:
  schedule:
    # Hourly incremental updater. The endpoint is idempotent: it compares the
    # latest reflection response timestamp against the last theme-generation
    # time and short-circuits as `skipped: true` (no AI cost) when nothing is
    # new. So hourly sweeps are cheap and only spend credits when new
    # reflections have actually been submitted since the last run.
    #
    # The date resolver below picks the *current in-progress* app day:
    #   - Before 07:00 UTC → yesterday's date key (closing app day)
    #   - At/after 07:00 UTC → today's date key (new active app day)
    # So :50 hourly means 06:50 UTC still captures the closing day right
    # before the 07:00 UTC rollover, and the remaining hours incrementally
    # update themes for the new in-progress app day as responses arrive.
    - cron: "50 * * * *"
  workflow_dispatch:
    inputs:
      date_key:
        description: "Optional app-date override (YYYY-MM-DD)"
        required: false
      force_regenerate:
        description: "If true, run Claude/Gemini even when no new reflection responses since the last generation (uses credits)."
        required: false
        default: false
        type: boolean

jobs:
  generate-reflection-themes:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target date key
        id: resolve_date
        env:
          INPUT_DATE_KEY: ${{ inputs.date_key || '' }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_DATE_KEY:-}" ]; then
            EFFECTIVE_DATE_KEY="${INPUT_DATE_KEY}"
            echo "Using manual date_key override: ${EFFECTIVE_DATE_KEY}"
          else
            EFFECTIVE_DATE_KEY="$(node -e '
              const d = new Date();
              const adj = new Date(d);
              if (d.getUTCHours() < 7) adj.setUTCDate(adj.getUTCDate() - 1);
              const y = adj.getUTCFullYear();
              const m = String(adj.getUTCMonth() + 1).padStart(2, "0");
              const day = String(adj.getUTCDate()).padStart(2, "0");
              process.stdout.write(`${y}-${m}-${day}`);
            ')"
            echo "No date_key provided; using current closing app day: ${EFFECTIVE_DATE_KEY}"
          fi
          if ! echo "${EFFECTIVE_DATE_KEY}" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "Invalid resolved date key: ${EFFECTIVE_DATE_KEY}"
            exit 1
          fi
          echo "date_key=${EFFECTIVE_DATE_KEY}" >> "$GITHUB_OUTPUT"

      - name: Call reflection theme generation endpoint
        env:
          RESET_URL: ${{ secrets.RESET_URL }}
          REFLECTION_THEME_TOKEN: ${{ secrets.REFLECTION_THEME_TOKEN }}
          RESET_TOKEN: ${{ secrets.RESET_TOKEN }}
          DATE_KEY: ${{ steps.resolve_date.outputs.date_key }}
          FORCE_REGENERATE: ${{ inputs.force_regenerate }}
        run: |
          set -euo pipefail

          if [ -z "${RESET_URL:-}" ]; then
            echo "Missing RESET_URL secret"
            exit 1
          fi

          TOKEN="${REFLECTION_THEME_TOKEN:-${RESET_TOKEN:-}}"
          if [ -z "${TOKEN:-}" ]; then
            echo "Missing REFLECTION_THEME_TOKEN or RESET_TOKEN secret"
            exit 1
          fi

          API_BASE_URL="${RESET_URL%/api/daily-reset}"
          THEMES_URL="${API_BASE_URL}/api/reflection-themes/generate"
          echo "Generating reflection themes for ${DATE_KEY}"

          BODY="{\"source\":\"github-actions\",\"appDateKey\":\"${DATE_KEY}\"}"
          if [ "${FORCE_REGENERATE:-false}" = "true" ]; then
            BODY="{\"source\":\"github-actions\",\"appDateKey\":\"${DATE_KEY}\",\"force\":true}"
            echo "force_regenerate=true — AI will run even if there are no new responses."
          fi

          # In-workflow retry: 3 attempts with backoff. Belt-and-suspenders alongside
          # the multiple cron schedules — handles transient network / 5xx errors
          # without waiting for the next scheduled run.
          MAX_ATTEMPTS=3
          attempt=1
          last_http_code=""
          while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do
            echo "::group::Attempt ${attempt}/${MAX_ATTEMPTS}"
            http_code=$(curl -sS -o response.json -w "%{http_code}" \
              --max-time 240 \
              -X POST "$THEMES_URL" \
              -H "Content-Type: application/json" \
              -H "x-reflection-theme-token: $TOKEN" \
              --data "$BODY") || http_code="000"
            last_http_code="$http_code"

            echo "HTTP $http_code"
            cat response.json || true
            echo "::endgroup::"

            # 400 "No reflection responses found" is a terminal non-error: nothing to archive yet.
            if [ "$http_code" = "400" ] && grep -Eq '"error"[[:space:]]*:[[:space:]]*"No reflection responses found for date"' response.json; then
              echo "No responses found for ${DATE_KEY}; leaving archive unchanged."
              exit 0
            fi

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ] && \
               grep -Eq '"success"[[:space:]]*:[[:space:]]*true' response.json; then
              echo "Reflection theme generation succeeded on attempt ${attempt}."
              exit 0
            fi

            echo "Attempt ${attempt} failed (HTTP ${http_code})."
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              sleep_seconds=$((attempt * 30))
              echo "Sleeping ${sleep_seconds}s before retry..."
              sleep "$sleep_seconds"
            fi
            attempt=$((attempt + 1))
          done

          echo "Reflection theme generation failed after ${MAX_ATTEMPTS} attempts (last HTTP ${last_http_code})."
          exit 1
