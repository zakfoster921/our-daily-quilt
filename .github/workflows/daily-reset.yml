name: Daily Quilt Reset

on:
  schedule:
    # 07:00 UTC: new app-day key is getAppDateKey() (e.g. 2026-04-29); server archives quilts/{yesterdayKey} then clears quilts/{todayKey}.
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  daily-reset:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily reset endpoint
        env:
          RESET_URL: ${{ secrets.RESET_URL }}
          RESET_TOKEN: ${{ secrets.RESET_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${RESET_URL:-}" ] || [ -z "${RESET_TOKEN:-}" ]; then
            echo "Missing RESET_URL or RESET_TOKEN secret"
            exit 1
          fi

          http_code=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "$RESET_URL" \
            -H "Content-Type: application/json" \
            -H "x-reset-token: $RESET_TOKEN" \
            --data '{"source":"github-actions","mode":"daily"}')

          echo "HTTP $http_code"
          cat response.json

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 299 ]; then
            echo "Reset request failed"
            exit 1
          fi

          if ! grep -Eq '"success"[[:space:]]*:[[:space:]]*true' response.json; then
            echo "Reset returned success=false"
            exit 1
          fi
