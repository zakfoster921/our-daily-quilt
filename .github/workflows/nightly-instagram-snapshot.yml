# Rebuild final Zapier/Instagram stills (classic + layout B post + layout B story 9:16) for the last completed quilt day.
# No reel / WebM / MP4. Sets instagram-images/{date}.readyForInstagram = true.
# Run Zapier after this job succeeds (e.g. filter readyForInstagram or schedule after 23:30 UTC).
# Requires RESET_URL secret (ending in /api/daily-reset) to derive APP_URL / API_BASE_URL.

name: Nightly Instagram images (no reel)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # 23:30 UTC — after the quilt day ends (app day rolls at 07:00 UTC).
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      date_key:
        description: "Quilt date to render (YYYY-MM-DD). Default: last completed quilt day."
        required: false

jobs:
  nightly-ig-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Resolve target date key
        id: resolve_date
        env:
          INPUT_DATE_KEY: ${{ inputs.date_key || '' }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_DATE_KEY:-}" ]; then
            EFFECTIVE_DATE_KEY="${INPUT_DATE_KEY}"
            echo "Using manual date_key override: ${EFFECTIVE_DATE_KEY}"
          else
            EFFECTIVE_DATE_KEY="$(node -e '
              const d = new Date();
              const adj = new Date(d);
              if (d.getUTCHours() < 7) adj.setUTCDate(adj.getUTCDate() - 1);
              adj.setUTCDate(adj.getUTCDate() - 1);
              const y = adj.getUTCFullYear();
              const m = String(adj.getUTCMonth() + 1).padStart(2, "0");
              const day = String(adj.getUTCDate()).padStart(2, "0");
              process.stdout.write(`${y}-${m}-${day}`);
            ')"
            echo "Using last completed quilt day: ${EFFECTIVE_DATE_KEY}"
          fi
          if ! echo "${EFFECTIVE_DATE_KEY}" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "Invalid resolved date key: ${EFFECTIVE_DATE_KEY}"
            exit 1
          fi
          echo "date_key=${EFFECTIVE_DATE_KEY}" >> "$GITHUB_OUTPUT"

      - name: Generate final Instagram images for Zapier
        id: nightly_ig
        env:
          RESET_URL: ${{ secrets.RESET_URL }}
          DATE_KEY: ${{ steps.resolve_date.outputs.date_key }}
          NIGHTLY_IG_MAX_ATTEMPTS: "3"
          NIGHTLY_IG_ARTIFACTS_DIR: "tmp/nightly-ig-artifacts"
        run: |
          set -euo pipefail
          if [ -z "${RESET_URL:-}" ]; then
            echo "Missing RESET_URL secret"
            exit 1
          fi
          API_BASE_URL="${RESET_URL%/api/daily-reset}"
          APP_URL="${API_BASE_URL}/our-daily-beta.html"
          echo "API_BASE_URL=${API_BASE_URL}"
          echo "APP_URL=${APP_URL}"
          APP_URL="$APP_URL" API_BASE_URL="$API_BASE_URL" DATE_KEY="${DATE_KEY:-}" \
            NIGHTLY_IG_MAX_ATTEMPTS="${NIGHTLY_IG_MAX_ATTEMPTS}" \
            NIGHTLY_IG_ARTIFACTS_DIR="${NIGHTLY_IG_ARTIFACTS_DIR}" \
            npm run nightly:ig-images

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: nightly-ig-failure-artifacts
          path: tmp/nightly-ig-artifacts
          if-no-files-found: ignore

      - name: Report failure
        if: failure()
        run: |
          DK="${{ steps.resolve_date.outputs.date_key }}"
          echo "::error::Nightly IG images failed for ${DK}. Zapier may still have early-day PNGs. Re-run workflow_dispatch with date_key=${DK} after fixing."
