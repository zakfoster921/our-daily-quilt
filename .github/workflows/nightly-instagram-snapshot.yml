# Rebuild final Zapier/Instagram stills (classic + quilt-screen 9:16 + layout B post + layout B story) for the last completed quilt day.
# No reel / WebM / MP4. Sets instagram-images/{date}.readyForInstagram = true.
# Schedule: 07:45 UTC primary + 11:00 UTC pre-Zapier safety pass (Zapier posts ~12:00 UTC / 7 AM CT).
# Requires RESET_URL secret (ending in /api/daily-reset) to derive APP_URL / API_BASE_URL.

name: Nightly Instagram images (no reel)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # 07:45 UTC (~2:45 AM CT) — after 07:00 UTC reset; first final stills for yesterday's quilt.
    - cron: "45 7 * * *"
    # 11:00 UTC (~6:00 AM CT) — safety rebuild 1h before Zapier (~7 AM CT / 12:00 UTC).
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      date_key:
        description: "Quilt date to render (YYYY-MM-DD). Default: last completed quilt day."
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nightly-ig-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        timeout-minutes: 8
        run: npm ci --ignore-scripts

      # Headless shell only (~90MB) — matches chromium.launch({ headless: true }) and is much
      # faster than full Chromium (~250MB). Cache avoids re-downloading every run.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}-chromium-headless-shell

      - name: Install Playwright Chromium headless shell
        timeout-minutes: 8
        run: |
          set -euo pipefail
          echo "Installing Playwright chromium-headless-shell..."
          npx playwright install chromium-headless-shell
          echo "Playwright install complete."

      - name: Resolve target date key
        id: resolve_date
        env:
          INPUT_DATE_KEY: ${{ inputs.date_key || '' }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_DATE_KEY:-}" ]; then
            EFFECTIVE_DATE_KEY="${INPUT_DATE_KEY}"
            echo "Using manual date_key override: ${EFFECTIVE_DATE_KEY}"
          else
            EFFECTIVE_DATE_KEY="$(node -e '
              const d = new Date();
              const adj = new Date(d);
              if (d.getUTCHours() < 7) adj.setUTCDate(adj.getUTCDate() - 1);
              adj.setUTCDate(adj.getUTCDate() - 1);
              const y = adj.getUTCFullYear();
              const m = String(adj.getUTCMonth() + 1).padStart(2, "0");
              const day = String(adj.getUTCDate()).padStart(2, "0");
              process.stdout.write(`${y}-${m}-${day}`);
            ')"
            echo "Using last completed quilt day: ${EFFECTIVE_DATE_KEY}"
          fi
          if ! echo "${EFFECTIVE_DATE_KEY}" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "Invalid resolved date key: ${EFFECTIVE_DATE_KEY}"
            exit 1
          fi
          echo "date_key=${EFFECTIVE_DATE_KEY}" >> "$GITHUB_OUTPUT"

      - name: Start local app (same commit as workflow)
        run: |
          set -euo pipefail
          mkdir -p tmp
          npx --yes serve@14 -l 8765 . > tmp/serve-nightly.log 2>&1 &
          echo "SERVE_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:8765/our-daily-beta.html" >/dev/null; then
              echo "Local app ready on :8765"
              exit 0
            fi
            sleep 1
          done
          cat tmp/serve-nightly.log || true
          echo "::error::Local static server failed to start"
          exit 1

      - name: Generate final Instagram images for Zapier
        id: nightly_ig
        timeout-minutes: 22
        env:
          RESET_URL: ${{ secrets.RESET_URL }}
          DATE_KEY: ${{ steps.resolve_date.outputs.date_key }}
          NIGHTLY_IG_MAX_ATTEMPTS: "2"
          NIGHTLY_IG_ARTIFACTS_DIR: "tmp/nightly-ig-artifacts"
        run: |
          set -euo pipefail
          if [ -z "${RESET_URL:-}" ]; then
            echo "Missing RESET_URL secret"
            exit 1
          fi
          API_BASE_URL="${RESET_URL%/api/daily-reset}"
          APP_URL="http://127.0.0.1:8765/our-daily-beta.html"
          echo "API_BASE_URL=${API_BASE_URL} (Firestore/API)"
          echo "APP_URL=${APP_URL} (clipping JS from this commit)"
          APP_URL="$APP_URL" API_BASE_URL="$API_BASE_URL" DATE_KEY="${DATE_KEY:-}" \
            NIGHTLY_IG_MAX_ATTEMPTS="${NIGHTLY_IG_MAX_ATTEMPTS}" \
            NIGHTLY_IG_ARTIFACTS_DIR="${NIGHTLY_IG_ARTIFACTS_DIR}" \
            npm run nightly:ig-images

      - name: Resolve tomorrow's date key
        id: resolve_tomorrow
        env:
          DATE_KEY: ${{ steps.resolve_date.outputs.date_key }}
        run: |
          set -euo pipefail
          TOMORROW_DATE_KEY="$(node -e "
            const { addDays } = require('./scripts/lib/app-date-key.cjs');
            process.stdout.write(addDays(process.env.DATE_KEY, 1));
          ")"
          echo "tomorrow_date_key=${TOMORROW_DATE_KEY}" >> "$GITHUB_OUTPUT"
          echo "Tomorrow preview date: ${TOMORROW_DATE_KEY}"

      - name: Speaker cutout for tomorrow (skip if exists)
        timeout-minutes: 5
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIRESTORE_QUOTES_COLLECTION: ${{ secrets.FIRESTORE_QUOTES_COLLECTION }}
          REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ]; then
            echo "Missing GOOGLE_APPLICATION_CREDENTIALS_JSON — skipping tomorrow speaker cutout"
            exit 0
          fi
          node scripts/process-speaker-cutouts.cjs --opening-plus-one-speaker --soft-fail --limit=1

      - name: Check if tomorrow's newspaper clipping already exists
        id: check_tomorrow_clipping
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          TOMORROW_DATE_KEY: ${{ steps.resolve_tomorrow.outputs.tomorrow_date_key }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ]; then
            echo "skip_tomorrow_clipping=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SKIP=$(node -e "
            const admin = require('firebase-admin');
            const sa = JSON.parse(process.env.GOOGLE_APPLICATION_CREDENTIALS_JSON);
            admin.initializeApp({ credential: admin.credential.cert(sa), projectId: sa.project_id });
            admin.firestore().collection('instagram-images').doc(process.env.TOMORROW_DATE_KEY).get()
              .then(snap => {
                const url = String((snap.exists && snap.data()?.newspaperClippingUrl) || '').trim();
                process.stdout.write(url ? 'true' : 'false');
              })
              .catch(() => process.stdout.write('false'));
          ")
          echo "skip_tomorrow_clipping=${SKIP}" >> "$GITHUB_OUTPUT"
          echo "Tomorrow clipping exists: ${SKIP}"

      - name: Generate newspaper clipping for tomorrow (admin preview lookahead)
        if: steps.check_tomorrow_clipping.outputs.skip_tomorrow_clipping != 'true'
        timeout-minutes: 15
        env:
          RESET_URL: ${{ secrets.RESET_URL }}
          DATE_KEY: ${{ steps.resolve_tomorrow.outputs.tomorrow_date_key }}
          NIGHTLY_IG_CLIPPING_ONLY: "true"
          NIGHTLY_IG_SKIP_SCHEDULE_GUARD: "true"
          NIGHTLY_IG_MAX_ATTEMPTS: "3"
          NIGHTLY_IG_ARTIFACTS_DIR: "tmp/nightly-ig-artifacts-tomorrow"
        run: |
          set -euo pipefail
          if [ -z "${RESET_URL:-}" ]; then
            echo "Missing RESET_URL secret — skipping tomorrow clipping"
            exit 0
          fi
          API_BASE_URL="${RESET_URL%/api/daily-reset}"
          APP_URL="http://127.0.0.1:8765/our-daily-beta.html"
          echo "Tomorrow DATE_KEY=${DATE_KEY}"
          APP_URL="$APP_URL" API_BASE_URL="$API_BASE_URL" DATE_KEY="${DATE_KEY:-}" \
            NIGHTLY_IG_CLIPPING_ONLY=true \
            NIGHTLY_IG_SKIP_SCHEDULE_GUARD=true \
            NIGHTLY_IG_MAX_ATTEMPTS="${NIGHTLY_IG_MAX_ATTEMPTS}" \
            NIGHTLY_IG_ARTIFACTS_DIR="${NIGHTLY_IG_ARTIFACTS_DIR}" \
            npm run nightly:newspaper-clipping

      - name: Stop local app server
        if: always()
        run: |
          if [ -n "${SERVE_PID:-}" ]; then
            kill "${SERVE_PID}" 2>/dev/null || true
          fi

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: nightly-ig-failure-artifacts
          path: |
            tmp/nightly-ig-artifacts
            tmp/nightly-ig-artifacts-tomorrow
          if-no-files-found: ignore

      - name: Report failure
        if: failure()
        run: |
          DK="${{ steps.resolve_date.outputs.date_key }}"
          echo "::error::Nightly IG images failed for ${DK}. Zapier may still have early-day PNGs. Re-run workflow_dispatch with date_key=${DK} after fixing."
