# Pre-render today's quilt-screen quote clipping PNG (active calendar day at 07:00 UTC):
# newspaper-clipping.png only. Mood clippings compose client-side on the quilt screen.
# Runs before the full nightly IG stills job so the live quilt screen can load Storage URLs.

name: Today newspaper clipping PNG

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # 07:15 UTC — shortly after daily reset / Notion assignment sync window.
    - cron: "15 7 * * *"
  workflow_dispatch:
    inputs:
      date_key:
        description: "Calendar date for center quote (YYYY-MM-DD). Default: active quilt day."
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  today-newspaper-clipping:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        timeout-minutes: 8
        run: npm ci --ignore-scripts

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}-chromium-headless-shell

      - name: Install Playwright Chromium headless shell
        timeout-minutes: 8
        run: npx playwright install chromium-headless-shell

      - name: Resolve target date key
        id: resolve_date
        env:
          INPUT_DATE_KEY: ${{ inputs.date_key || '' }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_DATE_KEY:-}" ]; then
            EFFECTIVE_DATE_KEY="${INPUT_DATE_KEY}"
            echo "Using manual date_key override: ${EFFECTIVE_DATE_KEY}"
          else
            EFFECTIVE_DATE_KEY="$(node -e '
              const d = new Date();
              const adj = new Date(d);
              if (d.getUTCHours() < 7) adj.setUTCDate(adj.getUTCDate() - 1);
              const y = adj.getUTCFullYear();
              const m = String(adj.getUTCMonth() + 1).padStart(2, "0");
              const day = String(adj.getUTCDate()).padStart(2, "0");
              process.stdout.write(`${y}-${m}-${day}`);
            ')"
            echo "Using active quilt day: ${EFFECTIVE_DATE_KEY}"
          fi
          if ! echo "${EFFECTIVE_DATE_KEY}" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "Invalid resolved date key: ${EFFECTIVE_DATE_KEY}"
            exit 1
          fi
          echo "date_key=${EFFECTIVE_DATE_KEY}" >> "$GITHUB_OUTPUT"

      - name: Start local app (same commit as workflow)
        run: |
          set -euo pipefail
          mkdir -p tmp
          npx --yes serve@14 -l 8765 . > tmp/serve-today-clipping.log 2>&1 &
          echo "SERVE_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:8765/our-daily-beta.html" >/dev/null; then
              echo "Local app ready on :8765"
              exit 0
            fi
            sleep 1
          done
          cat tmp/serve-today-clipping.log || true
          echo "::error::Local static server failed to start"
          exit 1

      - name: Generate newspaper clipping for today
        timeout-minutes: 15
        env:
          RESET_URL: ${{ secrets.RESET_URL }}
          DATE_KEY: ${{ steps.resolve_date.outputs.date_key }}
          NIGHTLY_IG_CLIPPING_ONLY: "true"
          NIGHTLY_IG_SKIP_SCHEDULE_GUARD: "true"
          NIGHTLY_IG_MAX_ATTEMPTS: "3"
          NIGHTLY_IG_ARTIFACTS_DIR: "tmp/nightly-ig-artifacts"
        run: |
          set -euo pipefail
          if [ -z "${RESET_URL:-}" ]; then
            echo "Missing RESET_URL secret"
            exit 1
          fi
          API_BASE_URL="${RESET_URL%/api/daily-reset}"
          APP_URL="http://127.0.0.1:8765/our-daily-beta.html"
          echo "API_BASE_URL=${API_BASE_URL} (Firestore/API)"
          echo "APP_URL=${APP_URL} (clipping JS from this commit)"
          APP_URL="$APP_URL" API_BASE_URL="$API_BASE_URL" DATE_KEY="${DATE_KEY:-}" \
            NIGHTLY_IG_CLIPPING_ONLY=true \
            NIGHTLY_IG_SKIP_SCHEDULE_GUARD=true \
            NIGHTLY_IG_MAX_ATTEMPTS="${NIGHTLY_IG_MAX_ATTEMPTS}" \
            NIGHTLY_IG_ARTIFACTS_DIR="${NIGHTLY_IG_ARTIFACTS_DIR}" \
            npm run nightly:newspaper-clipping

      - name: Stop local app server
        if: always()
        run: |
          if [ -n "${SERVE_PID:-}" ]; then
            kill "${SERVE_PID}" 2>/dev/null || true
          fi

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: today-newspaper-clipping-failure
          path: tmp/nightly-ig-artifacts
          if-no-files-found: ignore
