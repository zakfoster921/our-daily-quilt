# Fast smoke checks on every push/PR to main — catches broken deps, syntax, and workflow YAML
# before Railway deploy or large refactors.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        timeout-minutes: 8
        run: npm ci --ignore-scripts

      - name: Run CI smoke checks
        run: npm run test:ci
