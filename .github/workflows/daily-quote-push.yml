name: Daily Quote Push

on:
  schedule:
    # Hourly: send to tokens whose local preferred hour matches (app-day quote exists after 07:00 UTC reset).
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      date_key:
        description: "Optional app-date override (YYYY-MM-DD)"
        required: false
      force:
        description: "Bypass per-token already-sent check (true/false)"
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily-quote-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call daily quote push endpoint
        env:
          RESET_URL: ${{ secrets.RESET_URL }}
          RESET_TOKEN: ${{ secrets.RESET_TOKEN }}
          DATE_KEY: ${{ inputs.date_key || '' }}
          FORCE: ${{ inputs.force || 'false' }}
        run: |
          set -euo pipefail

          if [ -z "${RESET_URL:-}" ] || [ -z "${RESET_TOKEN:-}" ]; then
            echo "Missing RESET_URL or RESET_TOKEN secret"
            exit 1
          fi

          API_BASE_URL="${RESET_URL%/api/daily-reset}"
          PUSH_URL="${API_BASE_URL}/api/push/daily-quote"
          BODY="{}"

          if [ -n "${DATE_KEY:-}" ]; then
            if ! echo "${DATE_KEY}" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "Invalid date_key: ${DATE_KEY}"
              exit 1
            fi
            BODY="{\"date\":\"${DATE_KEY}\"}"
          fi

          if [ "${FORCE:-false}" = "true" ]; then
            if [ "$BODY" = "{}" ]; then
              BODY='{"force":true}'
            else
              BODY="${BODY%\}},\"force\":true}"
            fi
          fi

          echo "POST ${PUSH_URL}"
          http_code=$(curl -sS -o response.json -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 120 \
            --retry 2 \
            --retry-delay 10 \
            --retry-all-errors \
            -X POST "$PUSH_URL" \
            -H "Content-Type: application/json" \
            -H "x-reset-token: $RESET_TOKEN" \
            --data "$BODY")

          echo "HTTP $http_code"
          cat response.json

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 299 ]; then
            echo "Daily quote push request failed"
            exit 1
          fi

          if ! grep -Eq '"success"[[:space:]]*:[[:space:]]*true' response.json; then
            echo "Daily quote push returned success=false"
            exit 1
          fi
