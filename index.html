<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Daily Quilt Beta</title>
    <script>
      (function () {
        var target = 'our-daily-beta.html' + (window.location.search || '') + (window.location.hash || '');
        window.location.replace(target);
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=our-daily-beta.html">
    </noscript>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loading {
            font-size: 24px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div>
        <div class="spinner"></div>
        <div class="loading">Loading Our Daily Quilt Beta...</div>
        <p>If you're not redirected automatically, <a id="odq-beta-fallback-link" href="our-daily-beta.html" style="color: #ffd700;">click here</a></p>
        <script>
          (function () {
            var link = document.getElementById('odq-beta-fallback-link');
            if (link) link.href = 'our-daily-beta.html' + (window.location.search || '') + (window.location.hash || '');
          })();
        </script>
    </div>
</body>
</html>
